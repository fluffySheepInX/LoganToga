# - tag: internal unique tag used by the game
# - id: display / ordering id
# - name: UI display name
# - icon: icon file name
# - kind: resource category (gold / trust / food)
# - initial_amount: starting amount at battle start
# - passive_income_per_sec: passive income gained every second

