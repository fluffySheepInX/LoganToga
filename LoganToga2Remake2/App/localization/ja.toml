[bonus_room.rooms.bonus_room_1]
title = "Bonus Room 1 / 兵士の方向性"
teaser = "弱いがストレスではない兵士について"
page1 = "この試作の兵士は、単体で戦況を背負う強さよりも、前線を作るために気軽に出しやすいことを重視しています。"
page2 = "RTS は要求される操作が積み重なるとすぐ忙しくなるため、多少弱くても命令に素直で役割が分かりやすいユニットの方が好みです。"
page3 = "その結果、飛び抜けて強くはないけれど、生産して損した気分になりにくい基礎兵を目指しています。"

[bonus_room.rooms.bonus_room_2]
title = "Bonus Room 2 / ラン形式の試作"
teaser = "各戦闘を短めにしている理由"
page1 = "Remake2 では、1 回の長い試合ではなく、短い戦闘をいくつか重ねるラン形式を試しています。"
page2 = "各戦闘のあとで少しずつ選択肢が広がると、構成が育っていく感覚を持ちやすく、もう一度遊び直すハードルも下がります。"
page3 = "Bonus Room もその延長にあり、ラン制覇後に少し寄り道できる小さなご褒美として置いています。"

[bonus_room.rooms.bonus_room_3]
title = "Bonus Room 3 / 画面の読みやすさ"
teaser = "情報量と視認性の両立について"
page1 = "戦場には多くの情報が出るため、何が起きているか、どこで起きているかが分かることを演出より優先しています。"
page2 = "ユニット、建物、エフェクトは、重なっても役割を見分けやすいように形や色で差を付ける方針です。"
page3 = "裏話としては、新しい見た目を足すよりも、追いやすさを少しずつ改善する作業に時間を使うことがよくあります。"

[bonus_room.rooms.bonus_room_4]
title = "Bonus Room 4 / 没メモ"
teaser = "採用しなかった案を少しだけ"
page1 = "初期案では、各兵士にもっと細かい固有アクションを持たせる方向も考えていました。"
page2 = "ただ、その方向はこの段階では忙しさが増えやすく、見通しの良さも損ないそうだったため、いったん見送りました。"
page3 = "今後、操作量を増やさずに面白さを足せる形が見つかれば、別の形で一部を戻すかもしれません。"

[bonus_room.rooms.bonus_room_5]
title = "Bonus Room 5 / テンポ調整"
teaser = "待たされている感覚を減らしたい"
page1 = "テンポ調整では、単純な強さよりも、プレイヤーに待たされている感覚を与えていないかを気にしています。"
page2 = "生産、移動、戦闘、報酬選択のどこかが間延びすると、ゲーム全体の手触りまで重く感じやすくなります。"
page3 = "そのため数値調整でも、難しさそのものより、流れが止まりにくいことを優先しています。"

