[battle.archetype_desc]
base = "Main base. Lose this and the front collapses."
barracks = "Production building for infantry. Essential for sustaining the front."
stable = "Stable dedicated to Spinner cavalry. Opens up aggressive plays."
turret = "Static defense that intercepts enemies. Good for holding the line."
worker = "Support unit for construction and early frontline patching."
soldier = "Basic low-cost infantry suited for holding the front."
archer = "Ranged unit that chips from behind. Works well behind a defense line."
sniper = "Ultra-long-range sniper that picks off dangerous backliners. You do not need many, but one changes the fight."
katyusha = "Backline support launcher that fires rockets automatically and punishes clusters. Weak at single-target cleanup."
machine_gun = "Heavy gunner with long range and rapid fire. Expensive, but strong even with low babysitting."
goliath = "Disposable suicide unit that explodes on approach. Even if shot down, it still threatens nearby enemies."
healer = "Backline support that automatically heals allied infantry. Cannot repair buildings."
spinner = "Fast spinning cavalry that damages nearby enemies while moving. Easy to throw into the fight."

[battle.archetype_flavor]
stable = "Units that break through on momentum dash out from here."
turret = "Set it down and it quietly does its job."
barracks = "Rough or not, this is where soldiers gather."
soldier = "Nothing flashy, but reliable under orders."
archer = "From one step back, they keep layering arrows where it matters."
sniper = "One shot at a time, the dangerous targets go quiet first."
katyusha = "Spread out and it is manageable. Clump up and it becomes lethal."
machine_gun = "Each bullet is light, but sustained fire makes advancing miserable."
goliath = "Dangerous if stopped. Dangerous if it gets through."
healer = "Mix one slightly behind the line and the front lasts much longer."
spinner = "Average when stopped, fun when moving."

