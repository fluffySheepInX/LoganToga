attack_range = "Distance at which the unit can attack. Higher values improve safety and first-hit control."
attack_cooldown = "Delay between attacks. Lower values mean faster repeated attacks."
aggro_range = "Detection radius for engaging targets. Higher values make units react earlier."
value = "Primary numeric strength of the card. For stat bonus cards this is the amount applied to the target stat."
rarity = "Controls how often the card appears in the reward pool. Use the row buttons to cycle Common, Rare, and Epic."
repeatable = "If enabled, the same card can be selected multiple times across a run."

