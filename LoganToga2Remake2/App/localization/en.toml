dual = "Advanced upgrade that improves both damage and fire rate."

[battle.upgrade.flavor]
power = "Even with fewer shots, each hit leaves a mark."
rapid = "Chip away faster and the line holds longer."
dual = "A large investment, but one that buys real control of the field."

