[bonus_room.rooms.bonus_room_1]
title = "Bonus Room 1 / Soldier Direction"
teaser = "On soldiers that feel weak but not frustrating"
page1 = "The soldiers in this prototype are designed less around carrying fights alone and more around being easy to deploy to form a frontline."
page2 = "RTS games become busy very quickly if the required actions pile up, so even if the unit is somewhat weak, I prefer one that responds cleanly to orders and has an obvious role."
page3 = "The result is a baseline soldier that is not overpowered, but also rarely feels bad to produce."

[bonus_room.rooms.bonus_room_2]
title = "Bonus Room 2 / Run Format Prototype"
teaser = "Why each battle is kept short"
page1 = "In Remake2, I am trying a run format built from multiple short battles instead of one long match."
page2 = "When the choices expand a little after each battle, it is easier to feel the build evolving and easier to jump back in for another attempt."
page3 = "The bonus rooms follow that same idea and act as a small post-clear reward that lets you take a brief detour."

[bonus_room.rooms.bonus_room_3]
title = "Bonus Room 3 / Screen Readability"
teaser = "Balancing information density and readability"
page1 = "Because the battlefield contains a lot of information, I prioritize readability over spectacle so it stays clear what is happening and where."
page2 = "Units, structures, and effects are shaped and colored to make their roles easier to distinguish, even when many elements overlap."
page3 = "As a small behind-the-scenes note, I often spend more time improving how easy things are to track than adding new visual flair."

[bonus_room.rooms.bonus_room_4]
title = "Bonus Room 4 / Scrapped Notes"
teaser = "A few ideas that were not adopted"
page1 = "Early concepts also considered giving each soldier more detailed unique actions."
page2 = "That direction made the game feel too busy too quickly, and at this prototype stage it looked likely to hurt clarity, so I set it aside."
page3 = "If I later find a way to add fun without adding extra actions, parts of those ideas may return in another form."

[bonus_room.rooms.bonus_room_5]
title = "Bonus Room 5 / Tempo Tuning"
teaser = "On reducing the feeling of waiting"
page1 = "When tuning tempo, I care less about raw power and more about whether the player is made to feel like they are waiting around."
page2 = "If production, movement, combat, or reward selection drags too much, the whole game starts to feel heavier."
page3 = "That is why even in number tuning, I prioritize a flow that keeps the game moving over difficulty for its own sake."

