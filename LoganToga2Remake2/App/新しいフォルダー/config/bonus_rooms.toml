[[rooms]]
id = "bonus_room_1"
title = "オマケ部屋1 / 兵士の方向性"
teaser = "弱いがストレスではない兵士像について"
pages = [
  "本作の兵士は、単体で無双する強さよりも、気軽に出して前線を作れる扱いやすさを重視しています。",
  "操作量を増やしすぎるとRTSが途端に忙しくなるので、多少弱くても命令に素直で、役割が分かりやすい方針にしました。",
  "その結果として『強すぎないが、出して損した気分になりにくい兵士』を基本の手触りにしています。"
]

[[rooms]]
id = "bonus_room_2"
title = "オマケ部屋2 / ラン形式の試作"
teaser = "1回ごとの戦いを短めにした理由"
pages = [
  "Remake2では、長い1戦よりも短い戦いを積み重ねるラン形式を試しています。",
  "1戦ごとに少しずつ選択肢が増えると、編成の変化を感じやすく、再挑戦のハードルも下がります。",
  "オマケ部屋もその流れで、クリア後に少しだけ寄り道できるご褒美として置いています。"
]

[[rooms]]
id = "bonus_room_3"
title = "オマケ部屋3 / 画面の見やすさ"
teaser = "情報量と視認性のバランス"
pages = [
  "戦場の情報量が多いゲームなので、派手さよりも『今どこで何が起きているか』を読み取りやすいことを優先しています。",
  "ユニットや拠点、エフェクトは役割ごとの見分けやすさを意識し、色や形が重なっても把握しやすいように寄せています。",
  "制作秘話としては、演出を足すより先に、見失いにくさを整える作業が多めです。"
]

[[rooms]]
id = "bonus_room_4"
title = "オマケ部屋4 / 没案メモ"
teaser = "採用しなかった案の一部"
pages = [
  "初期案では、兵士ごとに細かい固有アクションを増やす方向も考えていました。",
  "ただ、操作の忙しさが先に立ちやすく、今の試作段階では『分かりやすさ』を崩しそうだったため見送りました。",
  "今後は、操作を増やさず面白さだけ足せる形が見えたら、別案として再利用するかもしれません。"
]

[[rooms]]
id = "bonus_room_5"
title = "オマケ部屋5 / テンポ調整"
teaser = "待ち時間を減らしたい話"
pages = [
  "テンポ調整では、強さそのものより『待たされる感覚が少ないか』をかなり気にしています。",
  "生産、移動、交戦、報酬選択のどこかで間延びすると、全体の印象も重くなりやすいからです。",
  "そのため数値調整でも、単なる難しさより、触っていて止まりにくい流れを優先しています。"
]
