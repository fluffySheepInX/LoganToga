[[units]]
# ユニット種別。ここを turret にすると砲台定義として読み込まれる。
archetype = "turret"
# ゲーム内ヘルプやUIに出る説明文。性能には影響しない。
description = "足を止めて迎撃する防衛施設。前線の支え向き。"
# 雰囲気用テキスト。性能には影響しない。
flavor_text = "据えれば静かに仕事をする。"
# 当たり判定と占有サイズ。大きいほど置き場所や接触距離に影響する。
radius = 18.0
# 移動速度。タレットは動かないので通常は 0.0 のまま。
move_speed = 0.0
# 射程距離。大幅強化ならまずここを伸ばすと効きやすい。
attack_range = 170.0
# 攻撃間隔。小さいほど連射が速くなる。
attack_cooldown = 0.5
# 1発あたりの攻撃力。重い砲台にしたいならここを上げる。
attack_power = 34
# 耐久力。前線に置いて長持ちさせたいならここを上げる。
hp = 540
# 建設コスト。強化に合わせて重くしたい時に調整する。
cost = 140
# 生産時間。建設完了までの時間。建物なので 0.0 でも動作するが、建設処理側の値と合わせて調整する。
production_time = 0.0
# 移動可否。タレットは固定砲台なので false のまま。
can_move = false
# 敵を感知して戦闘開始する範囲。射程より少し長いと反応が良い。
aggro_range = 220.0

