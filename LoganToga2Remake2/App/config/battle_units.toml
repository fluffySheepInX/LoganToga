[[turret_upgrades]]
# コマンドスロット番号。どのキー/アイコン位置で出すか。
slot = 8
# 強化種別ID。内部判定用なので既存値を維持する。
type = "power"
# UIラベル。表示名のみ。
label = "POWER"
# アイコン1文字。表示用のみ。
glyph = "P"
# 強化説明。性能には影響しない。
description = "威力のみ強化。重い一撃で前線を支える。"
# 雰囲気用テキスト。性能には影響しない。
flavor_text = "少ない手数でも、撃てば違いが出る。"
# 強化コスト。強化を強くするなら上げる候補。
cost = 100
# 威力の加算値。火力を大幅に上げたいならここを増やす。
attack_power_delta = 4
# 攻撃間隔の加算値。マイナスにすると連射が速くなる。
attack_cooldown_delta = 0.0
# 初期解放されているか。false なら進行で解放する前提。
unlocked_by_default = true

