"battle.archetype_desc.base" = "Main base. Lose this and the front collapses."
"battle.archetype_desc.barracks" = "Production building for infantry. Essential for sustaining the front."
"battle.archetype_desc.stable" = "Stable dedicated to Spinner cavalry. Opens up aggressive plays."
"battle.archetype_desc.turret" = "Static defense that intercepts enemies. Good for holding the line."
"battle.archetype_desc.worker" = "Support unit for construction and early frontline patching."
"battle.archetype_desc.soldier" = "Basic low-cost infantry suited for holding the front."
"battle.archetype_desc.archer" = "Ranged unit that chips from behind. Works well behind a defense line."
"battle.archetype_desc.sniper" = "Ultra-long-range sniper that picks off dangerous backliners. You do not need many, but one changes the fight."
"battle.archetype_desc.katyusha" = "Backline support launcher that fires rockets automatically and punishes clusters. Weak at single-target cleanup."
"battle.archetype_desc.machine_gun" = "Heavy gunner with long range and rapid fire. Expensive, but strong even with low babysitting."
"battle.archetype_desc.goliath" = "Disposable suicide unit that explodes on approach. Even if shot down, it still threatens nearby enemies."
"battle.archetype_desc.healer" = "Backline support that automatically heals allied infantry. Cannot repair buildings."
"battle.archetype_desc.spinner" = "Fast spinning cavalry that damages nearby enemies while moving. Easy to throw into the fight."
"battle.archetype_flavor.stable" = "Units that break through on momentum dash out from here."
"battle.archetype_flavor.turret" = "Set it down and it quietly does its job."
"battle.archetype_flavor.barracks" = "Rough or not, this is where soldiers gather."
"battle.archetype_flavor.soldier" = "Nothing flashy, but reliable under orders."
"battle.archetype_flavor.archer" = "From one step back, they keep layering arrows where it matters."
"battle.archetype_flavor.sniper" = "One shot at a time, the dangerous targets go quiet first."
"battle.archetype_flavor.katyusha" = "Spread out and it is manageable. Clump up and it becomes lethal."
"battle.archetype_flavor.machine_gun" = "Each bullet is light, but sustained fire makes advancing miserable."
"battle.archetype_flavor.goliath" = "Dangerous if stopped. Dangerous if it gets through."
"battle.archetype_flavor.healer" = "Mix one slightly behind the line and the front lasts much longer."
"battle.archetype_flavor.spinner" = "Average when stopped, fun when moving."
"battle.upgrade.label.power" = "POWER"
"battle.upgrade.label.rapid" = "RAPID"
"battle.upgrade.label.dual" = "DUAL"
"battle.upgrade.label.default" = "UPGRADE"
"battle.upgrade.desc.power" = "Boosts damage only. Supports the front with heavier hits."
"battle.upgrade.desc.rapid" = "Boosts fire rate only. Best for sustained interception."
"battle.upgrade.desc.dual" = "Advanced upgrade that improves both damage and fire rate."
"battle.upgrade.flavor.power" = "Even with fewer shots, each hit leaves a mark."
"battle.upgrade.flavor.rapid" = "Chip away faster and the line holds longer."
"battle.upgrade.flavor.dual" = "A large investment, but one that buys real control of the field."
